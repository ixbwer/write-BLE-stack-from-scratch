# BabbleSim 目标专用 Kconfig 覆盖层
# 用法: west build -b nrf52_bsim ... -- -DEXTRA_CONF_FILE=prj_bsim.conf
#
# 与 prj.conf 叠加，覆盖不适合 bsim 仿真环境的硬件相关配置。

# ── 控制台输出 ───────────────────────────────────────────────────────────────
# bsim 目标的 UART 默认写入 pty 设备（非直接终端显示）。
# 使用 UART PTY 自动附加: 运行时加 --uart0_pty_attach 参数（见运行脚本）。
# 需保留 CONFIG_SERIAL=y 才能编译 nRF UART 驱动（bsim HW model 需要）。
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y

# ── 关闭 bsim 不支持的功能 ──────────────────────────────────────────────────
# nrf52_bsim 不对外提供真实 USB 或 J-Link RTT，关闭以免依赖项报错
CONFIG_USE_SEGGER_RTT=n

# ── 调试辅助 ────────────────────────────────────────────────────────────────
# bsim 默认开启 NO_OPTIMIZATIONS，方便用 GDB 调试
# CONFIG_NO_OPTIMIZATIONS=y  # 已在 nrf52_bsim_defconfig 中设置

# ── 保持与 prj.conf 相同的 BT 配置 ─────────────────────────────────────────
# (无需重复，prj.conf 已声明 CONFIG_BT / CONFIG_BT_LL_SW_SPLIT 等)
# bt_enable() 不被调用 → Controller 不会抢占 RADIO 外设
